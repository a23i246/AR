<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR.js 自転 サンプル</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
      import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      // --- あなたのFirebase設定コードをここに貼り付け ---
      const firebaseConfig = {
        apiKey: "AIzaSyB6sOyrSwjY7fZaPEGDvn0iormTPWhjQsY",
        authDomain: "ar-stamp-6d9ed.firebaseapp.com",
        projectId: "ar-stamp-6d9ed",
        storageBucket: "ar-stamp-6d9ed.firebasestorage.app",
        messagingSenderId: "238550666098",
        appId: "1:238550666098:web:8c161928290c093bf8abeb",
        measurementId: "G-44D1V7P76C"
      };
      // -------------------------------------------

      // Firebaseの初期化
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      // 匿名ログインの実行
      signInAnonymously(auth).catch((error) => {
        console.error("ログインエラー:", error);
      });

      // ログイン状態の確認（ユーザーIDを取得するため）
      let uid = "";
      onAuthStateChanged(auth, (user) => {
        if (user) {
          uid = user.uid;
          console.log("ログイン完了！ ユーザーID:", uid);
        }
      });

      // 後で使うためにグローバル変数として公開（簡易的な実装のため）
      window.db = db;
      window.getUid = () => uid;
      // ボタンとデータベースの連携
      const btn = document.getElementById('collect-btn');
      const markers = document.querySelectorAll('a-marker');

      markers.forEach((marker) => {
        marker.addEventListener('markerFound', () => {
          btn.style.display = 'block';
        });

        marker.addEventListener('markerLost', () => {
          btn.style.display = 'none';
        });
      });
      
      // マーカーを見つけた時
      marker.addEventListener('markerFound', () => {
        btn.style.display = 'block'; // ボタンを表示
      });

      // マーカーを見失った時
      marker.addEventListener('markerLost', () => {
        btn.style.display = 'none'; // ボタンを隠す
      });

      // ボタンを押した時の保存処理
      btn.onclick = async () => {
        const uid = window.getUid();
        if (!uid) return alert("ログイン中です。少々お待ちください。");

        try {
          // 「users/ユーザーID/collections/hiro」という場所にデータを保存
          await setDoc(doc(db, "users", uid, "collections", "hiro"), {
            name: "たんQ",
            timestamp: new Date()
          });
          alert("コレクションに追加しました！");
          btn.style.display = 'none';
        } catch (e) {
          console.error("保存失敗:", e);
          alert("保存に失敗しました。");
        }
      };
    </script>

    <script>
      // --- 1. スワイプで回転させるコンポーネント ---
      AFRAME.registerComponent('swipe-rotate', {
        schema: { speed: { default: 0.5 } },
        init: function () {
          this.touchStartX = 0;
          this.touchStartY = 0;
          this.isDragging = false;
          window.addEventListener('touchstart', (e) => {
            this.isDragging = true;
            this.touchStartX = e.touches[0].clientX;
            this.touchStartY = e.touches[0].clientY;
          });
          window.addEventListener('touchend', () => { this.isDragging = false; });
          window.addEventListener('touchmove', (e) => {
            if (!this.isDragging) return;
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const deltaX = currentX - this.touchStartX;
            const deltaY = currentY - this.touchStartY;
            const rotation = this.el.getAttribute('rotation');
            
            // X軸（上下）とY軸（左右）を回転させる
            this.el.setAttribute('rotation', {
              x: rotation.x - deltaY * this.data.speed,
              y: rotation.y + deltaX * this.data.speed,
              z: rotation.z
            });
            
            this.touchStartX = currentX;
            this.touchStartY = currentY;
          });
        }
      });

      // --- 2. オブジェクトの中心を【正確に】合わせるコンポーネント ---
      AFRAME.registerComponent('auto-center', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;

            // 親の回転などの影響を排除するため、透明なクローンを作って純粋なサイズを測る
            const clone = mesh.clone();
            clone.position.set(0, 0, 0);
            clone.rotation.set(0, 0, 0);
            clone.scale.set(1, 1, 1);
            clone.updateMatrixWorld(true);

            // 純粋なローカルサイズから中心を計算
            const box = new THREE.Box3().setFromObject(clone);
            const center = new THREE.Vector3();
            box.getCenter(center);

            // 中心が親要素の原点(0,0,0)に重なるように、逆方向にずらす
            this.el.setAttribute('position', {
              x: -center.x,
              y: -center.y,
              z: -center.z
            });
          });
        }
      });
    </script>

    <style>
      #collect-btn {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background-color: #ff5722;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        font-weight: bold;
        display: none; /* 最初は隠しておく */
        z-index: 1000;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <button id="collect-btn">今のをゲットする！</button>
    <a href="collection.html" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 10px; text-decoration: none; border-radius: 5px; z-index: 1000;">図鑑を見る</a>
    <a-scene embedded arjs renderer="colorManagement: true; exposure: 1.2;">
      <a-assets>
        <a-asset-item id="Corythosaurus-glb" src="models/コリトサウルス/base_basic_pbr.glb"></a-asset-item>
        <a-asset-item id="tanq-obj" src="models/tanQ/tanQ.obj"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; color: #BBB; intensity: 1.5"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 0.8" position="-1 1 1"></a-entity>

      <!-- マーカー情報を追加 -->
      <a-marker preset="hiro" id = "hiro">
        <a-entity swipe-rotate>
          <a-entity rotation="0 0 0">
            <a-entity 
                gltf-model="#Corythosaurus-glb" 
                scale="1 1 1"
                auto-center>
            </a-entity>
          </a-entity>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="markers/marker.patt" id="tanq">
        <a-entity swipe-rotate>
          <a-entity rotation="0 0 0">
            <a-entity 
              obj-model="obj: #tanq-obj"
              scale="1 1 1"
              auto-center>
            </a-entity>
          </a-entity>
        </a-entity>
      </a-marker>      

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
