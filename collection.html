<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARキャラクター図鑑</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --accent-color: #ff9800;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 図鑑リストのレイアウト */
        #collection-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* キャラクターカードのデザイン */
        .collection-item {
            background: var(--card-bg);
            border-radius: 15px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 左側：アイコンエリア */
        .item-visual {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            border-right: 2px solid #f0f0f0;
        }

        /* 右側：テキストエリア */
        .item-info {
            padding: 15px;
            flex: 1;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
        }

        .item-date {
            font-size: 0.7rem;
            color: #999;
        }

        .item-desc {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #555;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin: 0;
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .back-btn {
            display: block;
            width: fit-content;
            margin: 40px auto;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

    <h1>📘 キャラクター図鑑</h1>

    <div id="collection-list">
        <p class="no-data">読み込み中...</p>
    </div>

    <a href="AR.html" class="back-btn">カメラへ戻る</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, query, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Firebase設定 (AR.htmlと同じもの)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // キャラクターの詳しい情報（図鑑のデータ）
        const charData = {
            "TanQ": {
                name: "たんQ君",
                desc: "いつも元気な探求心の塊！ARマーカーから飛び出して、君のコレクションに加わったよ。指で回してよく見てみよう。",
                icon: "🔍"
            },
            "kanji": {
                name: "漢字の精霊",
                desc: "古くから伝わる知恵の象徴。この精霊を見つけた者には、新しい発見があると言われている。",
                icon: "📝"
            },
            // 未登録のマーカー用デフォルト設定
            "unknown": {
                name: "なぞの物体",
                desc: "まだ詳しい情報が解明されていない未知のオブジェクトだ。これからの調査に期待しよう。",
                icon: "❓"
            }
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const collectionList = document.getElementById('collection-list');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadCollections(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        async function loadCollections(uid) {
            try {
                const q = query(collection(db, "users", uid, "collections"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                collectionList.innerHTML = "";

                if (querySnapshot.empty) {
                    collectionList.innerHTML = '<p class="no-data">まだ何も見つけていないようです。<br>冒険に出かけよう！</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const markerId = doc.id; // "hiro" など

                    // charDataから情報を取得。登録がなければ "unknown" を使う
                    const info = charData[markerId] || charData["unknown"];
                    
                    // 日付のフォーマット
                    let dateStr = "";
                    if (data.timestamp) {
                        const d = data.timestamp.toDate();
                        dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
                    }

                    // カードのHTML作成
                    const card = document.createElement('div');
                    card.className = 'collection-item';
                    card.innerHTML = `
                        <div class="item-visual">${info.icon}</div>
                        <div class="item-info">
                            <div class="item-header">
                                <h2 class="item-name">${info.name}</h2>
                                <span class="item-date">発見: ${dateStr}</span>
                            </div>
                            <p class="item-desc">${info.desc}</p>
                        </div>
                    `;
                    collectionList.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                collectionList.innerHTML = '<p class="no-data">読み込みエラー</p>';
            }
        }
    </script>
</body>
</html>
