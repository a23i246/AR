<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ARコレクション図鑑</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  
  <style>
    body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 20px; text-align: center; }
    h1 { color: #333; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
    .item { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .item-name { font-weight: bold; font-size: 14px; color: #ff5722; }
    .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 5px; }

    /* 詳細表示用のモーダルスタイル */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
      background-color: white;
      margin: 5% auto;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      height: 80%;
      border-radius: 15px;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    #model-container {
      width: 100%;
      height: 60%;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }
    #modal-desc {
      flex: 1;
      overflow-y: auto;
      text-align: left;
      padding: 0 10px;
      font-size: 14px;
      line-height: 1.5;
    }
    .close-btn {
      position: absolute;
      top: 10px; right: 15px;
      font-size: 28px;
      cursor: pointer;
      z-index: 10;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>ARコレクション図鑑</h1>
  <div id="status">読み込み中...</div>
  <div class="grid" id="collection-grid"></div>

  <a href="AR.html" class="back-btn">ARカメラに戻る</a>

  <div id="item-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="modal-close">&times;</span>
      <div id="model-container"></div>
      <h2 id="modal-title" style="margin: 10px 0;">名前</h2>
      <p id="modal-desc">説明文</p>
    </div>
  </div>

  <script>
    // --- 1. スワイプで回転させるコンポーネント ---
    AFRAME.registerComponent('swipe-rotate', {
      schema: { speed: { default: 0.5 } },
      init: function () {
        this.touchStartX = 0;
        this.isDragging = false;
        this.el.sceneEl.addEventListener('touchstart', (e) => {
          this.isDragging = true;
          this.touchStartX = e.touches[0].clientX;
        });
        this.el.sceneEl.addEventListener('touchend', () => { this.isDragging = false; });
        this.el.sceneEl.addEventListener('touchmove', (e) => {
          if (!this.isDragging) return;
          const currentX = e.touches[0].clientX;
          const deltaX = currentX - this.touchStartX;
          const rotation = this.el.getAttribute('rotation');
          this.el.setAttribute('rotation', {
            x: rotation.x,
            y: rotation.y + deltaX * this.data.speed,
            z: rotation.z
          });
          this.touchStartX = currentX;
        });
      }
    });

    // --- 2. オブジェクトの中心を正確に合わせるコンポーネント ---
    AFRAME.registerComponent('auto-center', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;
          const box = new THREE.Box3().setFromObject(mesh);
          const center = new THREE.Vector3();
          box.getCenter(center);
          this.el.setAttribute('position', {
            x: -center.x,
            y: -center.y,
            z: -center.z
          });
        });
      }
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ★Firebase設定（ここをご自身のものに書き換えてください）
    const firebaseConfig = {
      apiKey: "AIzaSyB6sOyrSwjY7fZaPEGDvn0iormTPWhjQsY",
      authDomain: "ar-stamp-6d9ed.firebaseapp.com",
      projectId: "ar-stamp-6d9ed",
      storageBucket: "ar-stamp-6d9ed.firebasestorage.app",
      messagingSenderId: "238550666098",
      appId: "1:238550666098:web:8c161928290c093bf8abeb",
      measurementId: "G-44D1V7P76C"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // キャラクターの基本データ（説明文やモデルファイル名）
    const charData = {
      "hiro": {
        name: "たんQ",
        desc: "いつも元気な探究心の塊。ARの世界から飛び出してきたぞ！指でスワイプして観察してみよう。",
        model: "たんQ.obj"
      }
      // 他のマーカーが増えたらここに追加
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const grid = document.getElementById('collection-grid');
        const status = document.getElementById('status');
        
        try {
          const querySnapshot = await getDocs(collection(db, "users", user.uid, "collections"));
          
          if (querySnapshot.empty) {
            status.innerText = "まだコレクションがありません。";
          } else {
            status.style.display = 'none';
            querySnapshot.forEach((doc) => {
              const data = doc.data();
              const mId = data.markerId || doc.id;
              const charInfo = charData[mId] || { name: mId, desc: "詳細データがありません。", model: "" };

              const itemDiv = document.createElement('div');
              itemDiv.className = 'item';
              itemDiv.style.cursor = 'pointer';
              itemDiv.innerHTML = `
                <div class="item-name">${charInfo.name}</div>
                <div style="font-size: 10px; color: #999;">${data.timestamp?.toDate().toLocaleString() || ""}</div>
              `;

              itemDiv.onclick = () => showDetail(charInfo);
              grid.appendChild(itemDiv);
            });
          }
        } catch (e) {
          console.error(e);
          status.innerText = "データの取得に失敗しました。";
        }
      }
    });

    function showDetail(info) {
      document.getElementById('modal-title').innerText = info.name;
      document.getElementById('modal-desc').innerText = info.desc;
      const container = document.getElementById('model-container');
      container.innerHTML = '';

      if (info.model) {
        const sceneHtml = `
          <a-scene embedded style="width: 100%; height: 100%;">
            <a-assets>
              <a-asset-item id="char-obj" src="${info.model}"></a-asset-item>
            </a-assets>
            <a-entity swipe-rotate position="0 0 0">
              <a-entity obj-model="obj: #char-obj" scale="0.4 0.4 0.4" auto-center></a-entity>
            </a-entity>
            <a-sky color="#fff"></a-sky>
            <a-entity camera position="0 0 4" look-controls-enabled="false"></a-entity>
            <a-entity light="type: ambient; color: #BBB"></a-entity>
            <a-entity light="type: directional; color: #FFF; intensity: 0.8" position="-1 1 1"></a-entity>
          </a-scene>
        `;
        container.innerHTML = sceneHtml;
      }
      document.getElementById('item-modal').style.display = 'block';
    }

    document.getElementById('modal-close').onclick = () => {
      document.getElementById('item-modal').style.display = 'none';
      document.getElementById('model-container').innerHTML = '';
    };
  </script>
</body>
</html>
